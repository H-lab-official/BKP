<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seat Collab - Multi-User Zone Editor</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;padding:20px}
        h1{text-align:center;color:#FFD700;margin-bottom:24px;font-size:1.8rem;text-shadow:0 0 20px rgba(255,215,0,.3)}
        .card{background:#16213e;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #1a1a4e;box-shadow:0 4px 15px rgba(0,0,0,.3)}
        .card-title{color:#FFD700;font-size:1.1rem;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
        .form-row{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px;align-items:flex-end}
        .form-group{display:flex;flex-direction:column;gap:4px}
        .form-group label{font-size:.75rem;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px}
        input,select{background:#0f3460;border:1px solid #1a1a4e;color:#e0e0e0;padding:8px 12px;border-radius:6px;font-size:.9rem;outline:none;transition:border-color .2s}
        input:focus,select:focus{border-color:#FFD700;box-shadow:0 0 0 2px rgba(255,215,0,.15)}
        input[type="number"]{width:80px}
        input[type="text"]{width:160px}
        input.wide{width:250px}
        .btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
        .btn-gold{background:#FFD700;color:#1a1a2e}.btn-gold:hover{background:#ffed4a;transform:translateY(-1px)}
        .btn-blue{background:#3b82f6;color:#fff}.btn-blue:hover{background:#60a5fa}
        .btn-green{background:#10b981;color:#fff}.btn-green:hover{background:#34d399}
        .btn-red{background:#ef4444;color:#fff}.btn-red:hover{background:#f87171}
        .btn-outline{background:transparent;border:1px solid #FFD700;color:#FFD700}.btn-outline:hover{background:rgba(255,215,0,.1)}
        .btn-sm{padding:4px 10px;font-size:.78rem}
        .btn-purple{background:#8b5cf6;color:#fff}.btn-purple:hover{background:#a78bfa}
        .tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
        .tab{padding:8px 18px;background:#0f3460;border:1px solid #1a1a4e;border-radius:8px 8px 0 0;cursor:pointer;color:#9ca3af;font-weight:500;transition:all .2s}
        .tab.active{background:#16213e;color:#FFD700;border-bottom-color:#16213e;border-top:2px solid #FFD700}
        .tab:hover:not(.active){color:#e0e0e0;background:#1a2744}
        .zone-panel{display:none}.zone-panel.active{display:block}
        .seat-grid{display:block;width:100%;margin:12px 0;max-height:50vh;overflow:auto;padding:8px;background:#0d1b36;border-radius:8px}
        .seat-row{display:flex;gap:3px;margin-bottom:3px;width:100%}
        .seat-cell{flex:1;min-width:40px;height:36px;display:flex;align-items:center;justify-content:center;font-size:.65rem;border-radius:4px;cursor:pointer;transition:all .15s;border:1px solid transparent;user-select:none}
        .seat-cell.normal{background:#1e40af;color:#bfdbfe;border-color:#2563eb}.seat-cell.normal:hover{background:#2563eb;transform:scale(1.05)}
        .seat-cell.ignored{background:#374151;color:#6b7280;border-color:#4b5563;text-decoration:line-through}.seat-cell.ignored:hover{background:#4b5563}
        .channel-table{border-collapse:collapse;margin:8px 0}
        .channel-table th,.channel-table td{padding:6px 10px;border:1px solid #1a1a4e;font-size:.82rem}
        .channel-table th{background:#0f3460;color:#FFD700;font-weight:500}
        .channel-table input{width:60px;padding:4px 6px;font-size:.82rem}
        .display-toggle{display:flex;gap:8px;margin:8px 0;align-items:center}
        .display-toggle label{font-size:.82rem;color:#9ca3af}
        .toggle-switch{position:relative;width:40px;height:20px}
        .toggle-switch input{display:none}
        .toggle-slider{position:absolute;inset:0;background:#374151;border-radius:10px;cursor:pointer;transition:.2s}
        .toggle-slider::before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.2s}
        .toggle-switch input:checked+.toggle-slider{background:#FFD700}
        .toggle-switch input:checked+.toggle-slider::before{left:22px}
        .badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.82rem;font-weight:600}
        .badge-gold{background:rgba(255,215,0,.15);color:#FFD700}
        .badge-blue{background:rgba(59,130,246,.15);color:#60a5fa}
        .badge-green{background:rgba(16,185,129,.15);color:#34d399}
        .badge-yellow{background:rgba(234,179,8,.15);color:#eab308}
        .badge-gray{background:rgba(107,114,128,.15);color:#9ca3af}
        .json-output{background:#0a0e1a;border:1px solid #1a1a4e;border-radius:8px;padding:16px;max-height:400px;overflow:auto;font-family:'Consolas',monospace;font-size:.8rem;color:#a5f3fc;white-space:pre-wrap;word-break:break-all;display:none}
        .json-output.visible{display:block}
        .log-entry{padding:8px 12px;margin:4px 0;border-radius:6px;font-size:.82rem;font-family:monospace}
        .log-success{background:rgba(16,185,129,.15);color:#34d399;border-left:3px solid #10b981}
        .log-error{background:rgba(239,68,68,.15);color:#f87171;border-left:3px solid #ef4444}
        .log-info{background:rgba(59,130,246,.15);color:#93c5fd;border-left:3px solid #3b82f6}
        .summary-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
        .summary-stats{display:flex;gap:20px;align-items:center}
        .stat-item{text-align:center}
        .stat-value{font-size:1.5rem;font-weight:700;color:#FFD700}
        .stat-label{font-size:.7rem;color:#6b7280;text-transform:uppercase}
        .actions-row{display:flex;gap:8px;flex-wrap:wrap}
        /* Saved zones table */
        .db-table{width:100%;border-collapse:collapse;margin:12px 0}
        .db-table th,.db-table td{padding:10px 14px;border:1px solid #1a1a4e;text-align:left;font-size:.85rem}
        .db-table th{background:#0f3460;color:#FFD700;font-weight:500}
        .db-table tr:hover{background:rgba(255,215,0,.03)}
        .db-table .actions{display:flex;gap:4px;flex-wrap:wrap}
        .empty-state{text-align:center;padding:40px;color:#6b7280;font-style:italic}
        .card-zone-editor{width:100vw;max-width:100vw;margin-left:calc(50% - 50vw);box-sizing:border-box}
        .edit-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;align-items:center;justify-content:center;padding:20px}
        .edit-modal.visible{display:flex}
        .edit-modal .modal-box{background:#16213e;border:1px solid #1a1a4e;border-radius:12px;padding:24px;min-width:320px;max-width:90vw}
        .edit-modal .modal-title{color:#FFD700;margin-bottom:16px;font-size:1.1rem}
        .edit-modal .form-group{margin-bottom:12px}
        .edit-modal .modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
        @media(max-width:768px){.form-row{flex-direction:column}input[type="text"],input.wide{width:100%}}
    </style>
</head>
<body>
    <!-- Edit Item Modal -->
    <div class="edit-modal" id="editModal" onclick="if(event.target===this)closeEditModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-title">แก้ไข Seat</div>
            <div class="form-group"><label>Name</label><input type="text" id="editName" class="wide" style="width:100%"></div>
            <div class="form-group"><label>Controller</label><input type="number" id="editChannel" min="0" style="width:100px"></div>
            <div class="form-group"><label>เลขที่นั่ง</label><input type="number" id="editPixelId" min="0" style="width:100px"></div>
            <div class="form-group"><label><input type="checkbox" id="editIgnore"> Ignore (ไม่นับ)</label></div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeEditModal()">ยกเลิก</button>
                <button class="btn btn-gold" onclick="saveEditItem()">บันทึก</button>
            </div>
        </div>
    </div>
    <h1>Seat Collab</h1>

    <!-- ===== Config Section ===== -->
    <div class="card">
        <div class="card-title">Config</div>
        <div class="form-row">
            <div class="form-group">
                <label>Seat ID</label>
                <input type="text" id="seatId" value="6" style="width:80px;">
            </div>
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" id="userName" class="wide" placeholder="e.g. John">
            </div>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="seatName" class="wide" placeholder="Concert Hall A">
            </div>
            <div class="form-group">
                <label>Controller Count</label>
                <input type="number" id="maxChannel" value="2" min="1">
            </div>
            <button class="btn btn-blue" onclick="loadFromAPI()">Load from API</button>
        </div>
    </div>

    <!-- ===== Saved Zones (from DB) ===== -->
    <div class="card">
        <div class="card-title">
            Saved Zones (Database)
            <button class="btn btn-sm btn-outline" onclick="refreshDB()" style="margin-left:auto">Refresh</button>
        </div>
        <div id="dbZonesContainer">
            <div class="empty-state">Click "Refresh" to load zones from database</div>
        </div>
    </div>

    <!-- ===== Zone Editor ===== -->
    <div class="card card-zone-editor">
        <div class="card-title">Zone Editor</div>
        <div class="tabs" id="zoneTabs">
            <button class="btn btn-outline btn-sm" onclick="addZone()">+ Add Zone</button>
        </div>
        <div id="zonePanels"></div>
    </div>

    <!-- ===== Summary & Publish ===== -->
    <div class="card">
        <div class="summary-bar">
            <div class="summary-stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalSeats">0</div>
                    <div class="stat-label">Editor Seats</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalZones">0</div>
                    <div class="stat-label">Editor Zones</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="dbReadyCount">0</div>
                    <div class="stat-label">DB Ready</div>
                </div>
            </div>
            <div class="actions-row">
                <button class="btn btn-outline" onclick="previewPublish()">Preview Publish JSON</button>
                <button class="btn btn-gold" onclick="publishToAPI()">Publish to API (POST)</button>
            </div>
        </div>
        <div class="json-output" id="jsonPreview"></div>
        <div id="responseLog" style="margin-top:12px;"></div>
    </div>

<script>
// ============================================================
// State
// ============================================================
let zones = [];
let activeTab = 0;
let seatModel = null;
let dbZones = [];

// ============================================================
// Zone Management
// ============================================================
function addZone(data) {
    const zone = data || {
        area: '', isHorizontal: true, row: 0, column: 0, burnId: 0,
        channelCount: 1, channels: [{ name: zones.length + 1, min: 1, max: 170 }],
        items: [], seatCount: 0, showId: false
    };
    if (!zone.channels) zone.channels = [];
    if (!zone.items) zone.items = [];
    zones.push(zone);
    activeTab = zones.length - 1;
    renderAll();
}

function removeZone(index) {
    if (!confirm('Delete zone "' + (zones[index].area || index) + '" from editor?')) return;
    zones.splice(index, 1);
    if (activeTab >= zones.length) activeTab = Math.max(0, zones.length - 1);
    renderAll();
}

function switchTab(index) { activeTab = index; renderAll(); }

// ============================================================
// Generate Items (Q() from code.txt)
// ============================================================
function generateItems(zi) {
    const z = zones[zi];
    z.row = parseInt(z.row) || 0; z.column = parseInt(z.column) || 0;
    if (z.row <= 0 || z.column <= 0) { alert('Row and Column must be > 0'); return; }
    z.items = [];
    for (let r = 0; r < z.row; r++)
        for (let c = 0; c < z.column; c++)
            z.items.push({ name: z.area+','+(r+1)+','+(c+1), pixelId:0, channel:0, ignore:false, idIndex: r*z.column+c });
    z.seatCount = z.items.filter(i=>!i.ignore).length;
    updateTotals(); renderAll();
    addLog('info', `Zone ${z.area}: Generated ${z.items.length} items (${z.row}x${z.column})`);
}

// ============================================================
// Assign Channels (le() from code.txt)
// ============================================================
function assignChannels(zi) {
    const z = zones[zi];
    if (!z.items || !z.items.length) { alert('Generate items first'); return; }
    if (!z.channels || !z.channels.length) { alert('Configure channels first'); return; }
    for (let ch of z.channels) { ch.min=parseInt(ch.min); ch.max=parseInt(ch.max); ch.name=parseInt(ch.name);
        if (ch.min<0||ch.max>170||ch.min>ch.max) { alert('Channel range error'); return; } }
    let count = 0;
    const assign = (item) => {
        if (item.ignore) { item.channel=0; item.pixelId=0; return true; }
        count++; let ci=0, off=1;
        if (z.channels.length > 0) { let mx=1;
            for (let w=0;w<z.channels.length;w++) { const ch=z.channels[w];
                if(w===0) mx+=ch.max-ch.min; else mx+=ch.max-ch.min+1;
                if(count>mx){ci++;off+=ch.max-ch.min+1;} else break; } }
        if (ci>=z.channels.length) { alert('Not enough channels at seat #'+count); return false; }
        item.channel=parseInt(z.channels[ci].name); item.pixelId=z.channels[ci].min+count-off; return true;
    };
    if (z.isHorizontal) {
        for (let r=0;r<z.row;r++) for (let c=0;c<z.column;c++) { if(!assign(z.items[r*z.column+c])) return; }
    } else {
        z.items.forEach((it,i)=>{it._x=Math.floor(i/z.column);it._y=i%z.column;});
        for (let c=0;c<z.column;c++) for (let r=0;r<z.row;r++) {
            const it=z.items.find(i=>i._x===r&&i._y===c); if(it&&!assign(it)) return; }
    }
    renderAll(); addLog('info', `Zone ${z.area}: Assigned channels for ${count} seats`);
}

let _clickTimeout = null;
function handleSeatClick(zi,row,col,e) {
    if (e.detail === 2) return; // double-click จะเปิด edit แทน
    clearTimeout(_clickTimeout);
    _clickTimeout = setTimeout(() => {
        toggleIgnore(zi,row,col);
        _clickTimeout = null;
    }, 200);
}
function handleSeatDblClick(zi,idx) {
    clearTimeout(_clickTimeout);
    _clickTimeout = null;
    editItem(zi, idx);
}
function toggleIgnore(zi,row,col) {
    const z=zones[zi]; const idx=(row-1)*z.column+(col-1);
    z.items[idx].ignore=!z.items[idx].ignore;
    z.seatCount=z.items.filter(i=>!i.ignore).length; updateTotals(); renderAll();
}

// ============================================================
// Edit Item (อันๆ ไป)
// ============================================================
let editState = { zi: -1, idx: -1 };

function editItem(zi, itemIndex) {
    const z = zones[zi];
    if (!z.items || !z.items[itemIndex]) return;
    const it = z.items[itemIndex];
    editState = { zi, idx: itemIndex };
    document.getElementById('editName').value = it.name || '';
    document.getElementById('editChannel').value = it.channel || 0;
    document.getElementById('editPixelId').value = it.pixelId || 0;
    document.getElementById('editIgnore').checked = !!it.ignore;
    document.getElementById('editModal').classList.add('visible');
}

function closeEditModal() {
    document.getElementById('editModal').classList.remove('visible');
    editState = { zi: -1, idx: -1 };
}

function saveEditItem() {
    if (editState.zi < 0 || editState.idx < 0) return;
    const z = zones[editState.zi];
    const it = z.items[editState.idx];
    it.name = document.getElementById('editName').value.trim() || it.name;
    it.channel = parseInt(document.getElementById('editChannel').value) || 0;
    it.pixelId = parseInt(document.getElementById('editPixelId').value) || 0;
    it.ignore = document.getElementById('editIgnore').checked;
    z.seatCount = z.items.filter(i => !i.ignore).length;
    updateTotals();
    renderAll();
    closeEditModal();
    addLog('info', `แก้ไข item: ${it.name}`);
}

function updateChannelCount(zi) {
    const z=zones[zi]; const cnt=parseInt(z.channelCount)||1;
    if(!z.channels) z.channels=[];
    if(cnt>z.channels.length) for(let i=z.channels.length;i<cnt;i++) z.channels.push({name:i+1,min:1,max:170});
    else z.channels=z.channels.slice(0,cnt);
    renderAll();
}

// ============================================================
// Save Zone to DB (รวมกับอันก่อนหน้าถ้ามี)
// ============================================================
async function saveZoneToDB(zi) {
    const z = zones[zi];
    if (!z.area) { alert('Please enter Area name'); return; }
    const seatId = document.getElementById('seatId').value;
    const userName = document.getElementById('userName').value;
    if (!seatId) { alert('Enter Seat ID'); return; }

    let zoneData = {
        area: z.area.toUpperCase(), isHorizontal: z.isHorizontal, row: z.row, column: z.column,
        burnId: z.burnId, channelCount: z.channelCount, channels: z.channels, items: [...(z.items||[])],
        seatCount: z.seatCount, model: z.model || null
    };

    try {
        const listRes = await fetch('/api/zones?seat_id='+seatId);
        const existingZones = await listRes.json();
        const existing = existingZones.find(x => x.area.toUpperCase() === z.area.toUpperCase());
        if (existing && existing.zone_data && existing.zone_data.items && existing.zone_data.items.length > 0) {
            const oldItems = existing.zone_data.items || [];
            const newItems = z.items || [];
            const byKey = {};
            oldItems.forEach(it => { byKey[it.name || ('idx'+it.idIndex)] = { ...it }; });
            newItems.forEach(it => { byKey[it.name || ('idx'+it.idIndex)] = { ...it }; });
            zoneData.items = Object.values(byKey).sort((a,b) => (a.idIndex||0) - (b.idIndex||0));
            zoneData.row = Math.max(existing.zone_data.row||0, z.row||0);
            zoneData.column = Math.max(existing.zone_data.column||0, z.column||0);
            zoneData.seatCount = zoneData.items.filter(i => !i.ignore).length;
        }

        const body = { seat_id: seatId, area: z.area.toUpperCase(), zone_data: zoneData, created_by: userName };
        const res = await fetch('/api/zones', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
        const data = await res.json();
        if (res.ok) {
            addLog('success', `Zone ${z.area} saved to DB (id: ${data.id})${existing ? ' - รวมกับอันก่อนหน้า' : ''}`);
            refreshDB();
        } else {
            addLog('error', `Save error: ${data.error}`);
        }
    } catch(e) { addLog('error', 'Save failed: '+e.message); }
}

// ============================================================
// DB Operations
// ============================================================
async function refreshDB() {
    const seatId = document.getElementById('seatId').value;
    if (!seatId) return;
    try {
        const res = await fetch('/api/zones?seat_id='+seatId);
        dbZones = await res.json();
        renderDBZones();
        // Update ready count
        const ready = dbZones.filter(z=>z.status==='ready').length;
        document.getElementById('dbReadyCount').textContent = ready;
    } catch(e) { addLog('error', 'Refresh failed: '+e.message); }
}

async function changeStatus(id, status) {
    try {
        await fetch('/api/zones/'+id+'/status', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status}) });
        refreshDB();
    } catch(e) { addLog('error', 'Status update failed: '+e.message); }
}

async function deleteFromDB(id) {
    if (!confirm('Delete this zone from database?')) return;
    try {
        await fetch('/api/zones/'+id, { method:'DELETE' });
        refreshDB();
        addLog('info', 'Zone deleted from DB');
    } catch(e) { addLog('error', 'Delete failed: '+e.message); }
}

function loadZoneToEditor(dbZone) {
    const zd = dbZone.zone_data;
    zd.showId = false;
    // Check if already in editor
    const existing = zones.findIndex(z => z.area && z.area.toUpperCase() === dbZone.area.toUpperCase());
    if (existing >= 0) {
        if (!confirm(`Zone ${dbZone.area} already in editor. Replace?`)) return;
        zones[existing] = zd;
        activeTab = existing;
    } else {
        zones.push(zd);
        activeTab = zones.length - 1;
    }
    renderAll();
    addLog('info', `Loaded Zone ${dbZone.area} to editor`);
}

// ============================================================
// Load from API (proxy)
// ============================================================
async function loadFromAPI() {
    const id = document.getElementById('seatId').value;
    if (!id) { alert('Enter Seat ID'); return; }
    addLog('info', 'Loading from API via proxy...');
    try {
        const res = await fetch('/api/proxy/seat?id='+id);
        const json = await res.json();
        const data = json.data || json;
        document.getElementById('seatName').value = data.name || '';
        document.getElementById('maxChannel').value = data.maxChannel || 2;
        seatModel = data.model || null;
        zones = [];
        if (data.zoning && data.zoning.length > 0) {
            data.zoning.sort((a,b)=>(a.order||0)-(b.order||0));
            data.zoning.forEach(z => {
                try { z.channels = JSON.parse(z.channelsString); } catch(e) { z.channels=[]; }
                z.channelCount = z.channels ? z.channels.length : 0;
                z.seatCount = z.items ? z.items.filter(i=>!i.ignore).length : 0;
                z.showId = false;
                zones.push(z);
            });
        }
        activeTab = 0; updateTotals(); renderAll();
        addLog('success', `Loaded from API: ${zones.length} zones, ${data.seatCount} seats`);
    } catch(e) { addLog('error', 'API load failed: '+e.message); }
}

// ============================================================
// Publish (combine DB ready zones → POST to real API)
// ============================================================
async function publishToAPI() {
    const seatId = document.getElementById('seatId').value;
    const readyCount = dbZones.filter(z=>z.status==='ready').length;
    if (readyCount === 0) { alert('No zones with "ready" status. Mark zones as ready first.'); return; }
    if (!confirm(`Publish ${readyCount} ready zone(s) to API?`)) return;

    addLog('info', `Publishing ${readyCount} zones to API...`);
    try {
        const res = await fetch('/api/publish', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                seat_id: seatId,
                name: document.getElementById('seatName').value,
                maxChannel: parseInt(document.getElementById('maxChannel').value) || 2,
                brunCount: 1,
                model: seatModel
            })
        });
        const data = await res.json();
        if (data.success) {
            addLog('success', `Published! API response: ${JSON.stringify(data.apiResponse)}`);
            refreshDB();
        } else {
            addLog('error', `Publish failed: ${JSON.stringify(data)}`);
        }
    } catch(e) { addLog('error', 'Publish error: '+e.message); }
}

async function previewPublish() {
    const el = document.getElementById('jsonPreview');
    if (el.classList.contains('visible')) { el.classList.remove('visible'); return; }
    // Fetch latest ready zones
    const seatId = document.getElementById('seatId').value;
    try {
        const res = await fetch('/api/zones?seat_id='+seatId);
        const all = await res.json();
        const ready = all.filter(z=>z.status==='ready');
        const zoning = ready.map((row,idx) => {
            const zd=row.zone_data;
            return { area:row.area, isHorizontal:zd.isHorizontal, row:zd.row, column:zd.column,
                burnId:zd.burnId, order:idx, channelCount:zd.channelCount,
                channelsString:JSON.stringify(zd.channels||[]),
                items_count: (zd.items||[]).length,
                items_sample: (zd.items||[]).slice(0,3) };
        });
        let totalSeats = 0;
        ready.forEach(r=>{ totalSeats += (r.zone_data.items||[]).filter(i=>!i.ignore).length; });
        const preview = {
            ID: seatId, seatCount: totalSeats, maxChannel: parseInt(document.getElementById('maxChannel').value),
            name: document.getElementById('seatName').value,
            zoning_summary: zoning,
            note: 'items truncated for preview. Full data sent on publish.'
        };
        el.textContent = JSON.stringify(preview, null, 2);
        el.classList.add('visible');
    } catch(e) { el.textContent = 'Error: '+e.message; el.classList.add('visible'); }
}

// ============================================================
// Logging & Totals
// ============================================================
function addLog(type, msg) {
    const log = document.getElementById('responseLog');
    const t = new Date().toLocaleTimeString();
    log.innerHTML = `<div class="log-entry log-${type}">[${t}] ${msg}</div>` + log.innerHTML;
}

function updateTotals() {
    let s=0; zones.forEach(z=>{ s += z.items ? z.items.filter(i=>!i.ignore).length : 0; });
    document.getElementById('totalSeats').textContent = s;
    document.getElementById('totalZones').textContent = zones.length;
}

// ============================================================
// Render
// ============================================================
function renderAll() { renderTabs(); renderZonePanels(); updateTotals(); }

function renderTabs() {
    const c = document.getElementById('zoneTabs');
    let h='';
    zones.forEach((z,i)=>{ h+=`<div class="tab ${i===activeTab?'active':''}" onclick="switchTab(${i})">${z.area||'Zone '+(i+1)}</div>`; });
    h+=`<button class="btn btn-outline btn-sm" onclick="addZone()" style="margin-left:8px">+ Add Zone</button>`;
    c.innerHTML = h;
}

function renderZonePanels() {
    const c = document.getElementById('zonePanels');
    let h='';
    zones.forEach((z,i)=>{
        h+=`<div class="zone-panel ${i===activeTab?'active':''}" id="zp${i}">`;
        h+=`<div class="form-row">
            <div class="form-group"><label>Area</label><input type="text" value="${z.area||''}" style="width:80px" onchange="zones[${i}].area=this.value;renderTabs()"></div>
            <div class="form-group"><label>Row</label><input type="number" value="${z.row||0}" min="0" onchange="zones[${i}].row=parseInt(this.value)"></div>
            <div class="form-group"><label>Column</label><input type="number" value="${z.column||0}" min="0" onchange="zones[${i}].column=parseInt(this.value)"></div>
            <div class="form-group"><label>Alignment</label><select onchange="zones[${i}].isHorizontal=(this.value==='true')">
                <option value="true" ${z.isHorizontal?'selected':''}>Horizontal</option>
                <option value="false" ${!z.isHorizontal?'selected':''}>Vertical</option></select></div>
            <div class="form-group"><label>Burn</label><input type="number" value="${z.burnId||0}" min="0" style="width:60px" onchange="zones[${i}].burnId=parseInt(this.value)"></div></div>`;
        h+=`<div class="form-row">
            <button class="btn btn-gold" onclick="generateItems(${i})">Generate Items</button>
            <button class="btn btn-blue" onclick="assignChannels(${i})">Assign Channels</button>
            <button class="btn btn-green" onclick="saveZoneToDB(${i})">Save to DB</button>
            <button class="btn btn-red btn-sm" onclick="removeZone(${i})">Delete</button></div>`;
        h+=`<div class="form-row" style="align-items:center"><div class="form-group"><label>Controller Count</label>
            <input type="number" value="${z.channelCount||0}" min="0" style="width:60px" onchange="zones[${i}].channelCount=parseInt(this.value);updateChannelCount(${i})"></div></div>`;
        if (z.channels&&z.channels.length>0) {
            h+=`<table class="channel-table"><thead><tr><th>#</th><th>Name</th><th>Min</th><th>Max</th></tr></thead><tbody>`;
            z.channels.forEach((ch,ci)=>{
                h+=`<tr><td>${ci+1}</td>
                    <td><input type="number" value="${ch.name||''}" onchange="zones[${i}].channels[${ci}].name=parseInt(this.value)"></td>
                    <td><input type="number" value="${ch.min||1}" onchange="zones[${i}].channels[${ci}].min=parseInt(this.value)"></td>
                    <td><input type="number" value="${ch.max||170}" onchange="zones[${i}].channels[${ci}].max=parseInt(this.value)"></td></tr>`; });
            h+=`</tbody></table>`;
        }
        h+=`<div class="display-toggle"><label>Show:</label><label style="color:#e0e0e0">Name</label>
            <label class="toggle-switch"><input type="checkbox" ${z.showId?'checked':''} onchange="zones[${i}].showId=this.checked;renderAll()">
            <span class="toggle-slider"></span></label><label style="color:#e0e0e0">Ch,Pixel</label></div>`;
        if (z.items&&z.items.length>0&&z.row>0&&z.column>0) {
            h+=`<div class="seat-grid">`;
            for(let r=0;r<z.row;r++){h+=`<div class="seat-row">`;
                for(let c=0;c<z.column;c++){const it=z.items[r*z.column+c];if(it){
                    const cls=it.ignore?'ignored':'normal';
                    const d=z.showId?it.channel+','+it.pixelId:it.name;
                    const idx=r*z.column+c;
                    h+=`<div class="seat-cell ${cls}" onclick="handleSeatClick(${i},${r+1},${c+1},event)" ondblclick="handleSeatDblClick(${i},${idx})" title="คลิก: toggle ignore | Double-click: แก้ไข">${d}</div>`;
                }}h+=`</div>`;}
            h+=`</div>`;
        }
        const sc=z.items?z.items.filter(it=>!it.ignore).length:0;
        h+=`<div style="margin-top:8px">Seats: <span class="badge badge-gold">${sc}</span> Items: <span class="badge badge-blue">${z.items?z.items.length:0}</span></div>`;
        h+=`</div>`;
    });
    c.innerHTML=h;
}

function renderDBZones() {
    const c = document.getElementById('dbZonesContainer');
    if (!dbZones.length) { c.innerHTML='<div class="empty-state">No zones saved yet for this Seat ID</div>'; return; }
    let h=`<table class="db-table"><thead><tr>
        <th>Area</th><th>Created By</th><th>Seats</th><th>Status</th><th>Updated</th><th>Actions</th></tr></thead><tbody>`;
    dbZones.forEach(z=>{
        const seats = (z.zone_data.items||[]).filter(i=>!i.ignore).length;
        const statusCls = z.status==='ready'?'badge-green': z.status==='posted'?'badge-gray':'badge-yellow';
        const time = new Date(z.updated_at).toLocaleString();
        h+=`<tr>
            <td><strong>${z.area}</strong></td>
            <td>${z.created_by||'-'}</td>
            <td>${seats}</td>
            <td><span class="badge ${statusCls}">${z.status}</span></td>
            <td style="font-size:.78rem">${time}</td>
            <td><div class="actions">
                <button class="btn btn-sm btn-blue" onclick='loadZoneToEditor(${JSON.stringify(z).replace(/'/g,"&#39;")})'>Load</button>
                ${z.status==='draft'?`<button class="btn btn-sm btn-green" onclick="changeStatus(${z.id},'ready')">Mark Ready</button>`:''}
                ${z.status==='ready'?`<button class="btn btn-sm btn-purple" onclick="changeStatus(${z.id},'draft')">Back to Draft</button>`:''}
                <button class="btn btn-sm btn-red" onclick="deleteFromDB(${z.id})">Del</button>
            </div></td></tr>`;
    });
    h+=`</tbody></table>`;
    c.innerHTML=h;
}

// ============================================================
// Init
// ============================================================
renderAll();
refreshDB();
</script>
</body>
</html>
