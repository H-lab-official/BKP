<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seat Collab - Multi-User Zone Editor</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;padding:20px}
        h1{text-align:center;color:#FFD700;margin-bottom:24px;font-size:1.8rem;text-shadow:0 0 20px rgba(255,215,0,.3)}
        .card{background:#16213e;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #1a1a4e;box-shadow:0 4px 15px rgba(0,0,0,.3)}
        .card-title{color:#FFD700;font-size:1.1rem;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
        .form-row{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px;align-items:flex-end}
        .form-group{display:flex;flex-direction:column;gap:4px}
        .form-group label{font-size:.75rem;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px}
        input,select{background:#0f3460;border:1px solid #1a1a4e;color:#e0e0e0;padding:8px 12px;border-radius:6px;font-size:.9rem;outline:none;transition:border-color .2s}
        input:focus,select:focus{border-color:#FFD700;box-shadow:0 0 0 2px rgba(255,215,0,.15)}
        input[type="number"]{width:80px}
        input[type="text"]{width:160px}
        input.wide{width:250px}
        .btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
        .btn-gold{background:#FFD700;color:#1a1a2e}.btn-gold:hover{background:#ffed4a;transform:translateY(-1px)}
        .btn-blue{background:#3b82f6;color:#fff}.btn-blue:hover{background:#60a5fa}
        .btn-green{background:#10b981;color:#fff}.btn-green:hover{background:#34d399}
        .btn-red{background:#ef4444;color:#fff}.btn-red:hover{background:#f87171}
        .btn-outline{background:transparent;border:1px solid #FFD700;color:#FFD700}.btn-outline:hover{background:rgba(255,215,0,.1)}
        .btn-sm{padding:4px 10px;font-size:.78rem}
        .btn-purple{background:#8b5cf6;color:#fff}.btn-purple:hover{background:#a78bfa}
        .tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
        .tab{padding:8px 18px;background:#0f3460;border:1px solid #1a1a4e;border-radius:8px 8px 0 0;cursor:pointer;color:#9ca3af;font-weight:500;transition:all .2s}
        .tab.active{background:#16213e;color:#FFD700;border-bottom-color:#16213e;border-top:2px solid #FFD700}
        .tab:hover:not(.active){color:#e0e0e0;background:#1a2744}
        .tab[draggable]{cursor:grab}
        .tab[draggable]:active{cursor:grabbing}
        .tab-drag-over{border:2px dashed #FFD700!important;background:#1a2744!important}
        .zone-panel{display:none}.zone-panel.active{display:block}
        .seat-grid{display:block;width:100%;margin:12px 0;max-height:50vh;overflow:auto;padding:8px;background:#0d1b36;border-radius:8px}
        .seat-row{display:flex;gap:3px;margin-bottom:3px;width:100%}
        .seat-cell{flex:1;min-width:40px;height:36px;display:flex;align-items:center;justify-content:center;font-size:.65rem;border-radius:4px;cursor:pointer;transition:all .15s;border:1px solid transparent;user-select:none}
        .seat-grid.square .seat-row{gap:4px;margin-bottom:4px;flex-wrap:nowrap}
        .seat-grid.square .seat-cell{width:44px;height:44px;min-width:44px;min-height:44px;flex:none;box-sizing:border-box}
        .seat-cell.normal{background:#1e40af;color:#bfdbfe;border-color:#2563eb}.seat-cell.normal:hover{background:#2563eb;transform:scale(1.05)}
        .seat-cell.ignored{background:#374151;color:#6b7280;border-color:#4b5563;text-decoration:line-through}.seat-cell.ignored:hover{background:#4b5563}
        .channel-table{border-collapse:collapse;margin:8px 0}
        .channel-table th,.channel-table td{padding:6px 10px;border:1px solid #1a1a4e;font-size:.82rem}
        .channel-table th{background:#0f3460;color:#FFD700;font-weight:500}
        .channel-table input{width:60px;padding:4px 6px;font-size:.82rem}
        .btn-arrow{background:none;border:1px solid #334;color:#9ca3af;cursor:pointer;padding:2px 6px;font-size:.7rem;border-radius:3px;margin:0 1px}
        .btn-arrow:hover:not(:disabled){color:#FFD700;border-color:#FFD700}
        .btn-arrow:disabled{opacity:.3;cursor:default}
        .display-toggle{display:flex;gap:8px;margin:8px 0;align-items:center}
        .display-toggle label{font-size:.82rem;color:#9ca3af}
        .toggle-switch{position:relative;width:40px;height:20px}
        .toggle-switch input{display:none}
        .toggle-slider{position:absolute;inset:0;background:#374151;border-radius:10px;cursor:pointer;transition:.2s}
        .toggle-slider::before{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.2s}
        .toggle-switch input:checked+.toggle-slider{background:#FFD700}
        .toggle-switch input:checked+.toggle-slider::before{left:22px}
        .badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.82rem;font-weight:600}
        .badge-gold{background:rgba(255,215,0,.15);color:#FFD700}
        .badge-blue{background:rgba(59,130,246,.15);color:#60a5fa}
        .badge-green{background:rgba(16,185,129,.15);color:#34d399}
        .badge-yellow{background:rgba(234,179,8,.15);color:#eab308}
        .badge-gray{background:rgba(107,114,128,.15);color:#9ca3af}
        .json-output{background:#0a0e1a;border:1px solid #1a1a4e;border-radius:8px;padding:16px;max-height:400px;overflow:auto;font-family:'Consolas',monospace;font-size:.8rem;color:#a5f3fc;white-space:pre-wrap;word-break:break-all;display:none}
        .json-output.visible{display:block}
        .log-entry{padding:8px 12px;margin:4px 0;border-radius:6px;font-size:.82rem;font-family:monospace}
        .log-success{background:rgba(16,185,129,.15);color:#34d399;border-left:3px solid #10b981}
        .log-error{background:rgba(239,68,68,.15);color:#f87171;border-left:3px solid #ef4444}
        .log-info{background:rgba(59,130,246,.15);color:#93c5fd;border-left:3px solid #3b82f6}
        .summary-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
        .summary-stats{display:flex;gap:20px;align-items:center}
        .stat-item{text-align:center}
        .stat-value{font-size:1.5rem;font-weight:700;color:#FFD700}
        .stat-label{font-size:.7rem;color:#6b7280;text-transform:uppercase}
        .actions-row{display:flex;gap:8px;flex-wrap:wrap}
        /* Saved zones table */
        .db-table{width:100%;border-collapse:collapse;margin:12px 0}
        .db-table th,.db-table td{padding:10px 14px;border:1px solid #1a1a4e;text-align:left;font-size:.85rem}
        .db-table th{background:#0f3460;color:#FFD700;font-weight:500}
        .db-table tr:hover{background:rgba(255,215,0,.03)}
        .db-table .actions{display:flex;gap:4px;flex-wrap:wrap}
        .empty-state{text-align:center;padding:40px;color:#6b7280;font-style:italic}
        .inline-edit{background:#1a2744;border:2px solid #FFD700;border-radius:8px;padding:12px 16px;margin:8px 0;display:none;gap:12px;align-items:flex-end;flex-wrap:wrap}
        .inline-edit.active{display:flex}
        .inline-edit .form-group{margin:0}
        .inline-edit .edit-label{color:#FFD700;font-size:.75rem;font-weight:600;margin-bottom:2px}
        .seat-cell.editing{outline:3px solid #FFD700;outline-offset:-1px;box-shadow:0 0 12px rgba(255,215,0,.5);transform:scale(1.1);z-index:2;position:relative}
        .seat-grid.edit-mode .seat-cell{cursor:cell}
        .seat-grid.edit-mode .seat-cell:hover{outline:2px dashed #FFD700;outline-offset:-1px}
        .card-zone-editor{width:100vw;max-width:100vw;margin-left:calc(50% - 50vw);box-sizing:border-box}
        .group-box{background:#0f3460;border:1px solid #1a1a4e;border-radius:8px;padding:16px;margin-bottom:16px}
        .group-title{color:#FFD700;font-size:.95rem;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #1a1a4e}
        @media(max-width:768px){.form-row{flex-direction:column}input[type="text"],input.wide{width:100%}}
    </style>
</head>
<body>
    <h1>Seat Collab</h1>

    <!-- ===== Config Section ===== -->
    <div class="card">
        <div class="card-title">Config</div>
        <div class="form-row">
            <div class="form-group">
                <label>Seat ID</label>
                <input type="text" id="seatId" value="6" style="width:80px;">
            </div>
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" id="userName" class="wide" placeholder="e.g. John">
            </div>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="seatName" class="wide" placeholder="Concert Hall A">
            </div>
            <div class="form-group">
                <label>Controller Count</label>
                <input type="number" id="maxChannel" value="2" min="1">
            </div>
            <button class="btn btn-blue" onclick="loadFromAPI()">Load from API</button>
        </div>
    </div>

    <!-- ===== Saved Zones (from DB) ===== -->
    <div class="card">
        <div class="card-title">
            Saved Zones (Database)
            <button class="btn btn-sm btn-outline" onclick="refreshDB()" style="margin-left:auto">Refresh</button>
        </div>
        <div id="dbZonesContainer">
            <div class="empty-state">Click "Refresh" to load zones from database</div>
        </div>
    </div>

    <!-- ===== Zone Editor ===== -->
    <div class="card card-zone-editor">
        <div class="card-title">Zone Editor</div>
        <div class="tabs" id="zoneTabs">
            <button class="btn btn-outline btn-sm" onclick="addZone()">+ Add Zone</button>
        </div>
        <div id="zonePanels"></div>
    </div>

    <!-- ===== Summary & Publish ===== -->
    <div class="card">
        <div class="summary-bar">
            <div class="summary-stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalSeats">0</div>
                    <div class="stat-label">Editor Seats</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalZones">0</div>
                    <div class="stat-label">Editor Zones</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="dbTotalCount">0</div>
                    <div class="stat-label">DB Zones</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="dbModifiedCount" style="color:#ff9800">0</div>
                    <div class="stat-label">Modified</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="dbPostedCount" style="color:#4caf50">0</div>
                    <div class="stat-label">Posted</div>
                </div>
            </div>
            <div class="actions-row">
                <button class="btn btn-outline" onclick="previewPublish()">Preview Publish JSON</button>
                <button class="btn btn-gold" onclick="publishToAPI()">Publish to API (POST)</button>
            </div>
        </div>
        <div class="json-output" id="jsonPreview"></div>
        <div id="responseLog" style="margin-top:12px;"></div>
    </div>

<script>
// ============================================================
// State
// ============================================================
let zones = [];
let activeTab = 0;
let seatModel = null;
let dbZones = [];
let seatGridStyle = 'square';

// ============================================================
// Zone Management
// ============================================================
function addZone(data) {
    const zone = data || {
        area: '', assignAlignment: 'ltr', alignment: 'ltr', rowFormat: 'tb_asc', colFormat: 'lr_asc', rowStart: 'A', colStart: '1', rowLetterMode: 'a', nameIgnoreMode: 'reserve', ignoreMode: 'skip', isHorizontal: true, row: 0, column: 0, burnId: 0,
        channelCount: 1, channels: [{ name: zones.length + 1, min: 1, max: 170 }],
        items: [], seatCount: 0, showId: false
    };
    if (!zone.channels) zone.channels = [];
    if (!zone.items) zone.items = [];
    zones.push(zone);
    activeTab = zones.length - 1;
    renderAll();
}

function removeZone(index) {
    if (!confirm('Delete zone "' + (zones[index].area || index) + '" from editor?')) return;
    zones.splice(index, 1);
    if (activeTab >= zones.length) activeTab = Math.max(0, zones.length - 1);
    renderAll();
}

function switchTab(index) { activeTab = index; renderAll(); }

// ============================================================
// Generate Items - รองรับ number/letter และ alignment
// ============================================================
function numToLetter(n) {
    let s = ''; n = parseInt(n) || 0;
    while (n > 0) { n--; s = String.fromCharCode(65 + n % 26) + s; n = Math.floor(n / 26); }
    return s || 'A';
}
function numToLetterWithMode(n, mode) {
    n = parseInt(n) || 0;
    if (mode === 'aa') {
        if (n <= 1) return 'AA';
        return numToLetter(n - 1);
    }
    return numToLetter(n);
}
function letterToNum(s) {
    if (!s) return 0;
    s = s.toUpperCase().replace(/[^A-Z]/g, '');
    let n = 0;
    for (let i = 0; i < s.length; i++) n = n * 26 + (s.charCodeAt(i) - 64);
    return n;
}
function getRowLetter(r, c, rows, cols, dir, offset, mode) {
    const letter = (n) => numToLetterWithMode(n, mode || 'a');
    if (dir === 'tb_asc')  return letter(r + offset);
    if (dir === 'tb_desc') return letter(rows - 1 - r + offset);
    if (dir === 'lr_asc')  return letter(c + offset);
    if (dir === 'lr_desc') return letter(cols - 1 - c + offset);
    return letter(r + offset);
}
function getColNumber(r, c, rows, cols, dir, offset) {
    if (dir === 'lr_asc')  return String(c + offset);
    if (dir === 'lr_desc') return String(cols - 1 - c + offset);
    if (dir === 'tb_asc')  return String(r + offset);
    if (dir === 'tb_desc') return String(rows - 1 - r + offset);
    return String(c + offset);
}
function generateItems(zi) {
    const z = zones[zi];
    z.row = parseInt(z.row) || 0; z.column = parseInt(z.column) || 0;
    if (z.row <= 0 || z.column <= 0) { alert('Row and Column must be > 0'); return; }
    const rowDir = z.rowFormat || 'tb_asc', colDir = z.colFormat || 'lr_asc';
    const mode = z.rowLetterMode || 'a';
    let rowOff = letterToNum(z.rowStart || 'A') || 1;
    if (mode === 'aa' && (z.rowStart || '').toUpperCase() === 'AA') rowOff = 1;
    const colOff = parseInt(z.colStart) || 1;
    z.items = [];
    for (let r = 0; r < z.row; r++)
        for (let c = 0; c < z.column; c++) {
            const rl = getRowLetter(r, c, z.row, z.column, rowDir, rowOff, mode);
            const cl = getColNumber(r, c, z.row, z.column, colDir, colOff);
            z.items.push({ name: z.area+','+rl+','+cl, pixelId:0, channel:0, ignore:false, idIndex: r*z.column+c });
        }
    z.seatCount = z.items.filter(i=>!i.ignore).length;
    updateTotals(); renderAll();
    addLog('info', `Zone ${z.area}: Generated ${z.items.length} items (${z.row}x${z.column}) row:${z.rowStart||'A'} col:${z.colStart||'1'}`);
}

// ============================================================
// Assign Channels (le() from code.txt)
// ============================================================
function assignChannels(zi, silent) {
    const z = zones[zi];
    if (!z.items || !z.items.length) { if (!silent) alert('Generate items first'); return; }
    if (!z.channels || !z.channels.length) { if (!silent) alert('Configure channels first'); return; }
    for (let ch of z.channels) { ch.min=parseInt(ch.min); ch.max=parseInt(ch.max); ch.name=parseInt(ch.name);
        if (ch.min<0||ch.max>170||ch.min>ch.max) { alert('Channel range error'); return; } }
    let count = 0;
    const ignoreMode = z.ignoreMode || 'skip';
    const assign = (item) => {
        if (item.ignore) {
            if (ignoreMode === 'reserve') count++;
            item.channel=0; item.pixelId=0; return true;
        }
        count++; let ci=0, off=1;
        if (z.channels.length > 0) { let mx=1;
            for (let w=0;w<z.channels.length;w++) { const ch=z.channels[w];
                if(w===0) mx+=ch.max-ch.min; else mx+=ch.max-ch.min+1;
                if(count>mx){ci++;off+=ch.max-ch.min+1;} else break; } }
        if (ci>=z.channels.length) { alert('Not enough channels at seat #'+count); return false; }
        item.channel=parseInt(z.channels[ci].name); item.pixelId=z.channels[ci].min+count-off; return true;
    };
    const align = z.assignAlignment || 'ltr';
    let order = [];
    if (align === 'ltr') { for (let r=0;r<z.row;r++) for (let c=0;c<z.column;c++) order.push(r*z.column+c); }
    else if (align === 'rtl') { for (let r=0;r<z.row;r++) for (let c=z.column-1;c>=0;c--) order.push(r*z.column+c); }
    else if (align === 'ltr_bt') { for (let r=z.row-1;r>=0;r--) for (let c=0;c<z.column;c++) order.push(r*z.column+c); }
    else if (align === 'rtl_bt') { for (let r=z.row-1;r>=0;r--) for (let c=z.column-1;c>=0;c--) order.push(r*z.column+c); }
    else if (align === 'ttb') { for (let c=0;c<z.column;c++) for (let r=0;r<z.row;r++) order.push(r*z.column+c); }
    else if (align === 'ttb_rl') { for (let c=z.column-1;c>=0;c--) for (let r=0;r<z.row;r++) order.push(r*z.column+c); }
    else if (align === 'btt') { for (let c=0;c<z.column;c++) for (let r=z.row-1;r>=0;r--) order.push(r*z.column+c); }
    else if (align === 'btt_rl') { for (let c=z.column-1;c>=0;c--) for (let r=z.row-1;r>=0;r--) order.push(r*z.column+c); }
    else { for (let r=0;r<z.row;r++) for (let c=0;c<z.column;c++) order.push(r*z.column+c); }
    for (const idx of order) { if (!assign(z.items[idx])) return; }
    renderAll(); addLog('info', `Zone ${z.area}: Assigned channels for ${count} seats`);
}

// ============================================================
// Recalc Names (เลื่อนชื่อเมื่อปิดที่นั่ง - ใช้ nameIgnoreMode)
// ============================================================
function recalcNames(zi) {
    const z = zones[zi];
    if (!z.items || !z.row || !z.column) return;
    const nameIgnoreMode = z.nameIgnoreMode || 'skip';
    if (nameIgnoreMode === 'reserve') return; // ไม่เลื่อนลำดับ - เก็บชื่อเดิม

    const rowDir = z.rowFormat || 'tb_asc';
    const colDir = z.colFormat || 'lr_asc';
    const letterMode = z.rowLetterMode || 'a';
    let rowOff = letterToNum(z.rowStart || 'A') || 1;
    if (letterMode === 'aa' && (z.rowStart || '').toUpperCase() === 'AA') rowOff = 1;
    const colOff = parseInt(z.colStart) || 1;

    if (colDir === 'tb_asc' || colDir === 'tb_desc') {
        for (let c = 0; c < z.column; c++) {
            const rowOrder = colDir === 'tb_asc' ? [...Array(z.row).keys()] : [...Array(z.row).keys()].reverse();
            let seq = 0;
            for (const r of rowOrder) {
                const idx = r * z.column + c;
                const it = z.items[idx];
                if (!it) continue;
                const rl = getRowLetter(r, c, z.row, z.column, rowDir, rowOff, letterMode);
                if (it.ignore) {
                    it.name = z.area + ',' + rl + ',-';
                } else {
                    seq++;
                    it.name = z.area + ',' + rl + ',' + (colOff + seq - 1);
                }
            }
        }
    } else {
        for (let r = 0; r < z.row; r++) {
            const colOrder = colDir === 'lr_asc' ? [...Array(z.column).keys()] : [...Array(z.column).keys()].reverse();
            let seq = 0;
            for (const c of colOrder) {
                const idx = r * z.column + c;
                const it = z.items[idx];
                if (!it) continue;
                const rl = getRowLetter(r, c, z.row, z.column, rowDir, rowOff, letterMode);
                if (it.ignore) {
                    it.name = z.area + ',' + rl + ',-';
                } else {
                    seq++;
                    it.name = z.area + ',' + rl + ',' + (colOff + seq - 1);
                }
            }
        }
    }
}

let editMode = false;

function toggleEditMode() {
    if (editMode && editState.zi >= 0) {
        saveInlineEditSilent(editState.zi);
    }
    editMode = !editMode;
    if (!editMode) {
        cancelInlineEdit(activeTab);
    }
    renderAll();
}

function handleSeatClick(zi, idx, e) {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    if (editMode) {
        editItem(zi, idx);
    } else {
        const z = zones[zi];
        z.items[idx].ignore = !z.items[idx].ignore;
        z.seatCount = z.items.filter(i => !i.ignore).length;
        recalcNames(zi);
        assignChannels(zi, 1);
        updateTotals();
        renderAll();
    }
}

// ============================================================
// Edit Item (Inline)
// ============================================================
let editState = { zi: -1, idx: -1 };

function editItem(zi, itemIndex) {
    const z = zones[zi];
    if (!z.items || !z.items[itemIndex]) return;
    const it = z.items[itemIndex];

    // Save current edit if switching to a different seat
    if (editState.zi >= 0 && editState.idx >= 0 && (editState.zi !== zi || editState.idx !== itemIndex)) {
        saveInlineEditSilent(editState.zi);
    }

    // Remove old highlight
    document.querySelectorAll('.seat-cell.editing').forEach(el => el.classList.remove('editing'));

    editState = { zi, idx: itemIndex };

    // Highlight the new seat
    const cells = document.querySelectorAll(`#zp${zi} .seat-cell`);
    if (cells[itemIndex]) cells[itemIndex].classList.add('editing');

    const nameEl = document.getElementById('ie_name_' + zi);
    if (!nameEl) return;
    nameEl.value = it.name || '';
    document.getElementById('ie_ch_' + zi).value = it.channel || 0;
    document.getElementById('ie_px_' + zi).value = it.pixelId || 0;
    document.getElementById('ie_ig_' + zi).checked = !!it.ignore;
    document.getElementById('ie_info_' + zi).textContent = `idIndex: ${it.idIndex} | row ${Math.floor(itemIndex / z.column) + 1}, col ${(itemIndex % z.column) + 1}`;
    const panel = document.getElementById('inlineEdit' + zi);
    if (panel) panel.classList.add('active');
    nameEl.focus();
    nameEl.select();
}

function cancelInlineEdit(zi) {
    const panel = document.getElementById('inlineEdit' + zi);
    if (panel) panel.classList.remove('active');
    editState = { zi: -1, idx: -1 };
    document.querySelectorAll('.seat-cell.editing').forEach(el => el.classList.remove('editing'));
}

function saveInlineEditSilent(zi) {
    if (editState.zi !== zi || editState.idx < 0) return;
    const z = zones[zi];
    const it = z.items[editState.idx];
    const nameEl = document.getElementById('ie_name_' + zi);
    if (!nameEl) return;
    const oldIgnore = it.ignore;
    it.name = nameEl.value.trim() || it.name;
    it.channel = parseInt(document.getElementById('ie_ch_' + zi).value) || 0;
    it.pixelId = parseInt(document.getElementById('ie_px_' + zi).value) || 0;
    it.ignore = document.getElementById('ie_ig_' + zi).checked;
    z.seatCount = z.items.filter(i => !i.ignore).length;
    if (it.ignore !== oldIgnore) {
        recalcNames(zi);
    }
    updateTotals();
}

function saveInlineEdit(zi) {
    saveInlineEditSilent(zi);
    recalcNames(zi);
    renderAll();
    if (editState.zi >= 0) {
        const it = zones[zi].items[editState.idx];
        addLog('info', `แก้ไข item: ${it.name}`);
        requestAnimationFrame(() => {
            const panel = document.getElementById('inlineEdit' + zi);
            if (panel) panel.classList.add('active');
            const nameEl = document.getElementById('ie_name_' + zi);
            if (nameEl) {
                nameEl.value = it.name;
                document.getElementById('ie_ch_' + zi).value = it.channel;
                document.getElementById('ie_px_' + zi).value = it.pixelId;
                document.getElementById('ie_ig_' + zi).checked = it.ignore;
            }
            const cells = document.querySelectorAll(`#zp${zi} .seat-cell`);
            if (cells[editState.idx]) cells[editState.idx].classList.add('editing');
        });
    }
}

function moveChannel(zi, ci, dir) {
    const z = zones[zi];
    const target = ci + dir;
    if (target < 0 || target >= z.channels.length) return;
    const tmp = z.channels[ci];
    z.channels[ci] = z.channels[target];
    z.channels[target] = tmp;
    renderAll();
}

function updateChannelCount(zi) {
    const z=zones[zi]; const cnt=parseInt(z.channelCount)||1;
    if(!z.channels) z.channels=[];
    if(cnt>z.channels.length) for(let i=z.channels.length;i<cnt;i++) z.channels.push({name:i+1,min:1,max:170});
    else z.channels=z.channels.slice(0,cnt);
    renderAll();
}

// ============================================================
// Save Zone to DB (รวมกับอันก่อนหน้าถ้ามี)
// ============================================================
async function saveZoneToDB(zi) {
    const z = zones[zi];
    if (!z.area) { alert('Please enter Area name'); return; }
    const seatId = document.getElementById('seatId').value;
    const userName = document.getElementById('userName').value;
    if (!seatId) { alert('Enter Seat ID'); return; }

    let zoneData = {
        area: z.area.toUpperCase(), assignAlignment: z.assignAlignment||'ltr', alignment: z.assignAlignment||'ltr', rowFormat: z.rowFormat||'tb_asc', colFormat: z.colFormat||'lr_asc', rowStart: z.rowStart||'A', colStart: z.colStart||'1', rowLetterMode: z.rowLetterMode||'a', nameIgnoreMode: 'reserve', ignoreMode: z.ignoreMode||'skip', isHorizontal: ['ltr','rtl','ltr_bt','rtl_bt'].includes(z.assignAlignment||'ltr'), row: z.row, column: z.column,
        burnId: z.burnId, channelCount: z.channelCount, channels: z.channels, items: [...(z.items||[])],
        seatCount: z.seatCount, model: z.model || null, tabOrder: zi
    };

    try {
        const listRes = await fetch('/api/zones?seat_id='+seatId);
        const existingZones = await listRes.json();
        const existing = existingZones.find(x => x.area.toUpperCase() === z.area.toUpperCase());
        if (existing && existing.zone_data && existing.zone_data.items && existing.zone_data.items.length > 0) {
            const oldItems = existing.zone_data.items || [];
            const newItems = z.items || [];
            const byKey = {};
            oldItems.forEach(it => { byKey[it.name || ('idx'+it.idIndex)] = { ...it }; });
            newItems.forEach(it => { byKey[it.name || ('idx'+it.idIndex)] = { ...it }; });
            zoneData.items = Object.values(byKey).sort((a,b) => (a.idIndex||0) - (b.idIndex||0));
            zoneData.row = Math.max(existing.zone_data.row||0, z.row||0);
            zoneData.column = Math.max(existing.zone_data.column||0, z.column||0);
            zoneData.seatCount = zoneData.items.filter(i => !i.ignore).length;
        }

        const body = { seat_id: seatId, area: z.area.toUpperCase(), zone_data: zoneData, created_by: userName };
        const res = await fetch('/api/zones', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
        const data = await res.json();
        if (res.ok) {
            addLog('success', `Zone ${z.area} saved to DB (id: ${data.id})${existing ? ' - รวมกับอันก่อนหน้า' : ''}`);
            refreshDB();
        } else {
            addLog('error', `Save error: ${data.error}`);
        }
    } catch(e) { addLog('error', 'Save failed: '+e.message); }
}

// ============================================================
// DB Operations
// ============================================================
async function refreshDB() {
    const seatId = document.getElementById('seatId').value;
    if (!seatId) return;
    try {
        const res = await fetch('/api/zones?seat_id='+seatId);
        dbZones = await res.json();
        renderDBZones();
        document.getElementById('dbTotalCount').textContent = dbZones.length;
        document.getElementById('dbModifiedCount').textContent = dbZones.filter(z=>z.status!=='posted').length;
        document.getElementById('dbPostedCount').textContent = dbZones.filter(z=>z.status==='posted').length;
    } catch(e) { addLog('error', 'Refresh failed: '+e.message); }
}

async function changeStatus(id, status) {
    try {
        await fetch('/api/zones/'+id+'/status', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status}) });
        refreshDB();
    } catch(e) { addLog('error', 'Status update failed: '+e.message); }
}

async function deleteFromDB(id) {
    if (!confirm('Delete this zone from database?')) return;
    try {
        await fetch('/api/zones/'+id, { method:'DELETE' });
        refreshDB();
        addLog('info', 'Zone deleted from DB');
    } catch(e) { addLog('error', 'Delete failed: '+e.message); }
}

function loadZoneToEditor(dbZone) {
    const zd = dbZone.zone_data;
    zd.showId = false;
    if (!zd.assignAlignment) zd.assignAlignment = zd.alignment || (zd.isHorizontal !== false ? 'ltr' : 'ttb');
    if (!zd.alignment) zd.alignment = zd.assignAlignment || 'ltr';
    if (!zd.rowFormat || !['tb_asc','tb_desc','lr_asc','lr_desc'].includes(zd.rowFormat)) zd.rowFormat = 'tb_asc';
    if (!zd.colFormat || !['lr_asc','lr_desc','tb_asc','tb_desc'].includes(zd.colFormat)) zd.colFormat = 'lr_asc';
    if (!zd.rowStart) zd.rowStart = 'A';
    if (!zd.colStart) zd.colStart = '1';
    if (!zd.rowLetterMode || !['a','aa'].includes(zd.rowLetterMode)) zd.rowLetterMode = 'a';
    zd.nameIgnoreMode = 'reserve';
    if (!zd.ignoreMode || !['skip','reserve'].includes(zd.ignoreMode)) zd.ignoreMode = 'skip';
    // Check if already in editor
    const existing = zones.findIndex(z => z.area && z.area.toUpperCase() === dbZone.area.toUpperCase());
    if (existing >= 0) {
        if (!confirm(`Zone ${dbZone.area} already in editor. Replace?`)) return;
        zones[existing] = zd;
        activeTab = existing;
    } else {
        zones.push(zd);
        activeTab = zones.length - 1;
    }
    renderAll();
    addLog('info', `Loaded Zone ${dbZone.area} to editor`);
}

// ============================================================
// Load from API (proxy)
// ============================================================
async function loadFromAPI() {
    const id = document.getElementById('seatId').value;
    if (!id) { alert('Enter Seat ID'); return; }
    addLog('info', 'Loading from API via proxy...');
    try {
        const res = await fetch('/api/proxy/seat?id='+id);
        const json = await res.json();
        const data = json.data || json;
        document.getElementById('seatName').value = data.name || '';
        document.getElementById('maxChannel').value = data.maxChannel || 2;
        seatModel = data.model || null;
        zones = [];
        if (data.zoning && data.zoning.length > 0) {
            data.zoning.sort((a,b)=>(a.order||0)-(b.order||0));
            data.zoning.forEach(z => {
                if (typeof z.channelsString === 'string') {
                    try { z.channels = JSON.parse(z.channelsString); } catch(e) { z.channels = []; }
                } else {
                    z.channels = Array.isArray(z.channels) ? z.channels : [];
                }
                z.channelCount = z.channels ? z.channels.length : 0;
                z.seatCount = z.items ? z.items.filter(i=>!i.ignore).length : 0;
                z.showId = false;
                if (!z.assignAlignment) z.assignAlignment = z.alignment || (z.isHorizontal !== false ? 'ltr' : 'ttb');
                if (!z.alignment) z.alignment = z.assignAlignment || 'ltr';
                if (!z.rowFormat || !['tb_asc','tb_desc','lr_asc','lr_desc'].includes(z.rowFormat)) z.rowFormat = 'tb_asc';
                if (!z.colFormat || !['lr_asc','lr_desc','tb_asc','tb_desc'].includes(z.colFormat)) z.colFormat = 'lr_asc';
                if (!z.rowStart) z.rowStart = 'A';
                if (!z.colStart) z.colStart = '1';
                if (!z.rowLetterMode || !['a','aa'].includes(z.rowLetterMode)) z.rowLetterMode = 'a';
                z.nameIgnoreMode = 'reserve';
                if (!z.ignoreMode || !['skip','reserve'].includes(z.ignoreMode)) z.ignoreMode = 'skip';
                zones.push(z);
            });
        }
        activeTab = 0; updateTotals(); renderAll();
        addLog('success', `Loaded from API: ${zones.length} zones, ${data.seatCount} seats`);
    } catch(e) { addLog('error', 'API load failed: '+e.message); }
}

// ============================================================
// Publish (combine ALL DB zones → POST to real API)
// ============================================================
async function publishToAPI(skipConfirm) {
    const seatId = document.getElementById('seatId').value;
    if (!seatId) { alert('Enter Seat ID'); return; }
    await refreshDB();
    if (dbZones.length === 0) { alert('No zones in DB. Save zones to DB first.'); return; }

    const modified = dbZones.filter(z => z.status !== 'posted');
    const unchanged = dbZones.filter(z => z.status === 'posted');
    if (!skipConfirm) {
        let msg = `Publish ทั้งหมด ${dbZones.length} zone(s) to API?\n\n`;
        if (modified.length > 0) msg += `⚡ แก้ไข/ใหม่ (${modified.length}): ${modified.map(z=>z.area).join(', ')}\n`;
        if (unchanged.length > 0) msg += `✓ ไม่เปลี่ยนแปลง (${unchanged.length}): ${unchanged.map(z=>z.area).join(', ')}`;
        if (!confirm(msg)) return;
    }

    addLog('info', `Publishing ${dbZones.length} zones to API (${modified.length} modified, ${unchanged.length} unchanged)...`);
    try {
        const res = await fetch('/api/publish', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
                seat_id: seatId,
                name: document.getElementById('seatName').value,
                maxChannel: parseInt(document.getElementById('maxChannel').value) || 2,
                brunCount: 1,
                model: seatModel
            })
        });
        const data = await res.json();
        if (data.success) {
            let logMsg = 'Published! ';
            if (data.modifiedAreas && data.modifiedAreas.length > 0) logMsg += `แก้ไข: [${data.modifiedAreas.join(', ')}] `;
            if (data.unchangedAreas && data.unchangedAreas.length > 0) logMsg += `ไม่เปลี่ยน: [${data.unchangedAreas.join(', ')}]`;
            addLog('success', logMsg);
            refreshDB();
        } else {
            addLog('error', `Publish failed: ${JSON.stringify(data)}`);
        }
    } catch(e) { addLog('error', 'Publish error: '+e.message); }
}

async function previewPublish() {
    const el = document.getElementById('jsonPreview');
    if (el.classList.contains('visible')) { el.classList.remove('visible'); return; }
    const seatId = document.getElementById('seatId').value;
    try {
        const res = await fetch('/api/zones?seat_id='+seatId);
        const all = await res.json();
        const zoning = all.map((row,idx) => {
            const zd=row.zone_data;
            return { area:row.area, status:row.status, isHorizontal:zd.isHorizontal, row:zd.row, column:zd.column,
                burnId:zd.burnId, order:idx, channelCount:zd.channelCount,
                channelsString:JSON.stringify(zd.channels||[]),
                items_count: (zd.items||[]).length,
                items_sample: (zd.items||[]).slice(0,3) };
        });
        let totalSeats = 0;
        all.forEach(r=>{ totalSeats += (r.zone_data.items||[]).filter(i=>!i.ignore).length; });
        const modified = all.filter(z=>z.status!=='posted').map(z=>z.area);
        const unchanged = all.filter(z=>z.status==='posted').map(z=>z.area);
        const preview = {
            ID: seatId, seatCount: totalSeats, maxChannel: parseInt(document.getElementById('maxChannel').value),
            name: document.getElementById('seatName').value,
            total_zones: all.length,
            modified_zones: modified,
            unchanged_zones: unchanged,
            zoning_summary: zoning,
            note: 'All zones will be sent on publish. Items truncated for preview.'
        };
        el.textContent = JSON.stringify(preview, null, 2);
        el.classList.add('visible');
    } catch(e) { el.textContent = 'Error: '+e.message; el.classList.add('visible'); }
}

function addLog(type, msg) {
    const log = document.getElementById('responseLog');
    const t = new Date().toLocaleTimeString();
    log.innerHTML = `<div class="log-entry log-${type}">[${t}] ${msg}</div>` + log.innerHTML;
}

function updateTotals() {
    let s=0; zones.forEach(z=>{ s += z.items ? z.items.filter(i=>!i.ignore).length : 0; });

    document.getElementById('totalZones').textContent = zones.length;
}

let _dragTabIdx = -1;
function renderTabs() {
    const c = document.getElementById('zoneTabs');
    let h='';
    zones.forEach((z,i)=>{
        h+=`<div class="tab ${i===activeTab?'active':''}" draggable="true"
            ondragstart="onTabDragStart(event,${i})" ondragover="onTabDragOver(event,${i})"
            ondragenter="onTabDragEnter(event)" ondragleave="onTabDragLeave(event)"
            ondrop="onTabDrop(event,${i})" ondragend="onTabDragEnd(event)"
            onclick="switchTab(${i})">${z.area||'Zone '+(i+1)}</div>`;
    });
    h+=`<button class="btn btn-outline btn-sm" onclick="addZone()" style="margin-left:8px">+ Add Zone</button>`;
    c.innerHTML = h;
}
function onTabDragStart(e,i) { _dragTabIdx=i; e.dataTransfer.effectAllowed='move'; e.target.style.opacity='0.4'; }
function onTabDragOver(e,i) { e.preventDefault(); e.dataTransfer.dropEffect='move'; }
function onTabDragEnter(e) { e.target.classList.add('tab-drag-over'); }
function onTabDragLeave(e) { e.target.classList.remove('tab-drag-over'); }
function onTabDragEnd(e) { e.target.style.opacity='1'; document.querySelectorAll('.tab-drag-over').forEach(el=>el.classList.remove('tab-drag-over')); }
function onTabDrop(e,targetIdx) {
    e.preventDefault(); e.target.classList.remove('tab-drag-over');
    if (_dragTabIdx<0||_dragTabIdx===targetIdx) return;
    const moved = zones.splice(_dragTabIdx,1)[0];
    zones.splice(targetIdx,0,moved);
    activeTab = targetIdx;
    _dragTabIdx = -1;
    zones.forEach((z,i) => { z.tabOrder = i; });
    renderAll();
    addLog('info', `Reordered zones: ${zones.map(z=>z.area||'?').join(' → ')}`);
    saveZoneOrder();
}
async function saveZoneOrder() {
    const seatId = document.getElementById('seatId').value;
    if (!seatId) return;
    const orders = zones.filter(z=>z.area).map((z,i) => ({ area: z.area, tabOrder: i }));
    if (orders.length === 0) return;
    try {
        await fetch('/api/zones/reorder', {
            method:'PUT', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ seat_id: seatId, orders })

        addLog('success', 'Zone order saved to DB');

                    <td style="white-space:nowrap">
                        <button class="btn-arrow" onclick="moveChannel(${i},${ci},-1);assignChannels(${i},1)" ${ci===0?'disabled':''} title="ขึ้น">▲</button>
                        <button class="btn-arrow" onclick="moveChannel(${i},${ci},1);assignChannels(${i},1)" ${ci===z.channels.length-1?'disabled':''} title="ลง">▼</button>
                    </td></tr>`; });
            h+=`</tbody></table>`;
        }
        h+=`</div>`;
        h+=`<div class="form-row" style="margin-top:12px">
            <button class="btn btn-green" onclick="saveZoneToDB(${i})">Save to DB</button>
            <button class="btn btn-red btn-sm" onclick="removeZone(${i})">Delete</button></div>`;
        h+=`<div style="display:flex;align-items:center;gap:12px;margin-top:12px;flex-wrap:wrap">
            <div class="display-toggle" style="margin:0"><label>รูปแบบตาราง:</label>
            <select onchange="seatGridStyle=this.value;renderAll()" style="padding:6px 10px;border-radius:6px;background:#0f3460;color:#e0e0e0;border:1px solid #1a1a4e">
            <option value="square" ${seatGridStyle==='square'?'selected':''}>จัตุรัส (44×44)</option>
            <option value="original" ${seatGridStyle==='original'?'selected':''}>แบบเดิม</option>
            </select></div>
            <div class="display-toggle" style="margin:0"><label>Show:</label><label style="color:#e0e0e0">Name</label>
            <label class="toggle-switch"><input type="checkbox" ${z.showId?'checked':''} onchange="zones[${i}].showId=this.checked;renderAll()">
            <span class="toggle-slider"></span></label><label style="color:#e0e0e0">Ch,Pixel</label></div>
            <button class="btn ${editMode?'btn-red':'btn-purple'} btn-sm" onclick="toggleEditMode()">${editMode?'ปิดแก้ไข':'แก้ไข'}</button>
            ${editMode?'<span style="color:#FFD700;font-size:.8rem">Edit Mode: คลิกที่นั่งเพื่อแก้ไข</span>':''}
        </div>`;
        h+=`<div class="inline-edit" id="inlineEdit${i}">
            <div class="form-group"><div class="edit-label">Name</div><input type="text" id="ie_name_${i}" style="width:140px"></div>
            <div class="form-group"><div class="edit-label">Controller</div><input type="number" id="ie_ch_${i}" min="0" style="width:80px"></div>
            <div class="form-group"><div class="edit-label">เลขที่นั่ง</div><input type="number" id="ie_px_${i}" min="0" style="width:80px"></div>
            <div class="form-group" style="align-self:center"><label style="color:#e0e0e0;font-size:.85rem;cursor:pointer"><input type="checkbox" id="ie_ig_${i}"> Ignore</label></div>
            <button class="btn btn-gold btn-sm" onclick="saveInlineEdit(${i})">Save</button>
            <button class="btn btn-outline btn-sm" onclick="toggleEditMode()">ปิดแก้ไข</button>
            <span id="ie_info_${i}" style="color:#9ca3af;font-size:.78rem;margin-left:4px"></span>
        </div>`;
        if (z.items&&z.items.length>0&&z.row>0&&z.column>0) {
            h+=`<div class="seat-grid ${editMode?'edit-mode':''} ${seatGridStyle==='square'?'square':''}">`;
            for(let r=0;r<z.row;r++){h+=`<div class="seat-row">`;
                for(let c=0;c<z.column;c++){const it=z.items[r*z.column+c];if(it){
                    const cls=it.ignore?'ignored':'normal';
                    const idx=r*z.column+c;
                    const editing=(editState.zi===i&&editState.idx===idx)?'editing':'';
                    const d=z.showId?it.channel+','+it.pixelId:it.name;
                    h+=`<div class="seat-cell ${cls} ${editing}" onclick="handleSeatClick(${i},${idx},event)" title="${editMode?'คลิก: แก้ไข':'คลิก: toggle ignore'}">${d}</div>`;
                }}h+=`</div>`;}
            h+=`</div>`;
        }
        const sc=z.items?z.items.filter(it=>!it.ignore).length:0;
        h+=`<div style="margin-top:8px">Seats: <span class="badge badge-gold">${sc}</span> Items: <span class="badge badge-blue">${z.items?z.items.length:0}</span></div>`;
        h+=`</div>`;
    });
    c.innerHTML=h;
    function restoreScroll() {
        Object.keys(scrollByZone).forEach(i => {
            const panel = document.getElementById('zp' + i);
            if (panel) {
                const grid = panel.querySelector('.seat-grid');
                if (grid) grid.scrollTop = scrollByZone[i];
            }
        });
        window.scrollTo(0, windowScrollY);
    }
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            restoreScroll();
            setTimeout(restoreScroll, 50);
        });
    });
}

function renderDBZones() {
    const c = document.getElementById('dbZonesContainer');
    if (!dbZones.length) { c.innerHTML='<div class="empty-state">No zones saved yet for this Seat ID</div>'; return; }
    let h=`<table class="db-table"><thead><tr>
        <th>Area</th><th>Created By</th><th>Seats</th><th>Status</th><th>Updated</th><th>Actions</th></tr></thead><tbody>`;
    dbZones.forEach(z=>{
        const seats = (z.zone_data.items||[]).filter(i=>!i.ignore).length;
        const statusCls = z.status==='posted'?'badge-green': z.status==='ready'?'badge-blue':'badge-yellow';
        const statusLabel = z.status==='posted'?'posted': z.status==='draft'?'modified':'ready';
        const rowStyle = z.status!=='posted'?'background:rgba(255,152,0,0.08);':'';
        const time = new Date(z.updated_at).toLocaleString();
        h+=`<tr style="${rowStyle}">
            <td><strong>${z.area}</strong></td>
            <td>${z.created_by||'-'}</td>
            <td>${seats}</td>
            <td><span class="badge ${statusCls}">${statusLabel}</span></td>
            <td style="font-size:.78rem">${time}</td>
            <td><div class="actions">
                <button class="btn btn-sm btn-blue" onclick='loadZoneToEditor(${JSON.stringify(z).replace(/'/g,"&#39;")})'>Load</button>
                <button class="btn btn-sm btn-red" onclick="deleteFromDB(${z.id})">Del</button>
            </div></td></tr>`;
    });
    h+=`</tbody></table>`;
    c.innerHTML=h;
}

// ============================================================
// Init
// ============================================================
renderAll();
refreshDB();
</script>
</body>
</html>
