# หลังรัน certbot ให้ uncomment ส่วนนี้และ comment ส่วน listen 80 ด้านบน
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name bkp.devza.autos;

    ssl_certificate /etc/letsencrypt/live/bkp.devza.autos/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bkp.devza.autos/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

